<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="output.css">
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[black]">
    <header class="flex justify-around items-center max-w-[1440px] m-auto">
<img class="hidden lg:block lg:text-white" src="./img/logo.png" alt="">
    <div class="flex gap-4 text-white">
      <a href="">Home </a>
      <a class="hover:text-[#0A84FF]" href="">Services</a>
      <a class="hover:text-[#0A84FF]" href="">Careers</a>
      <a class="hover:text-[#0A84FF]" href="">Career Details</a>
      <a class="hover:text-[#0A84FF]" href="">Contact</a>
    </div>
    <button class="hidden lg:block lg:bg-[#0A84FF] lg:p-3.5 lg:rounded-2xl lg:text-white">
      Contact Us
    </button>
   </header>
   <div class="w-full bg-[#121212] text-gray-300 font-sans relative overflow-hidden py-16 md:py-24 border-b border-gray-900">
  
  <div class="absolute inset-0 pointer-events-none opacity-20 select-none">
    <div class="absolute top-10 left-10 w-48 h-48 border border-gray-700 rounded-2xl"></div>
    <div class="absolute top-28 left-40 w-64 h-44 border border-gray-700 rounded-3xl"></div>
    <div class="absolute -top-10 left-96 w-32 h-56 border border-gray-700 rounded-full"></div>
  </div>

  <div class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-12 items-center relative z-10">
    
    <div class="space-y-6">
      <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight">
        Contact Us
      </h1>
      
      <p class="text-sm md:text-base text-gray-400 max-w-md leading-relaxed">
        Get in touch with our team to discuss how we can help transform your business. We're here to help.
      </p>
      
      <div class="pt-2">
        <a href="#contact-form" 
           class="inline-block bg-[#2563eb] hover:bg-blue-600 text-white font-medium text-sm px-6 py-3 rounded-lg transition duration-200 shadow-lg shadow-blue-500/10">
          Get In Touch Now
        </a>
      </div>
    </div>

    <div class="flex justify-center md:justify-end">
      <div class="relative w-72 h-72 md:w-96 md:h-96 flex items-center justify-center">
        <div class="absolute animate-pulse w-64 h-48 bg-blue-600/10 rounded-full blur-3xl"></div>
        <img src="./img/hjhviuyf.png" alt="Contact Illustration" 
             class="w-full h-auto object-contain relative z-10 max-w-[320px] md:max-w-full"
             onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'text-8xl\'>💬</div>';">
      </div>
    </div>

  </div>
</div>
</body>
</html>
