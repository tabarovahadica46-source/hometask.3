<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="output.css">
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[black]">
     <header class="flex justify-around items-center max-w-[1440px] m-auto">
<img class="hidden lg:block lg:text-white" src="./img/logo.png" alt="">
    <div class="flex gap-4 text-white">
      <a href="">Home </a>
      <a class="hover:text-[#0A84FF]" href="">Services</a>
      <a class="hover:text-[#0A84FF]" href="">Careers</a>
      <a class="hover:text-[#0A84FF]" href="">Career Details</a>
      <a class="hover:text-[#0A84FF]" href="">Contact</a>
    </div>
    <button class="hidden lg:block lg:bg-[#0A84FF] lg:p-3.5 lg:rounded-2xl lg:text-white">
      Contact Us
    </button>
   </header>

   <section class="max-w-6xl mx-auto my-12 bg-[#1a1a1e] rounded-3xl p-8 md:p-12 border border-gray-800/40 relative overflow-hidden shadow-2xl">
    
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center relative z-10">
      
      <div class="lg:col-span-7 text-center lg:text-left flex flex-col items-center lg:items-start space-y-6">
        
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-white tracking-tight leading-tight">
          Build the Future with Us
        </h1>
        
        <p class="text-sm md:text-base text-gray-400 max-w-xl leading-relaxed">
          We're a team of builders, thinkers, and explorers using AI, machine learning, and blockchain to solve meaningful problems.
        </p>
        
        <button class="px-6 py-3 bg-[#0A84FF] text-white font-semibold text-sm rounded-xl hover:bg-blue-600 transition-colors shadow-lg shadow-blue-500/20">
          Explore Open Positions
        </button>
      </div>

      <div class="lg:col-span-5 flex justify-center">
        <img class="w-48 sm:w-64 lg:w-full max-w-sm drop-shadow-[0_20px_50px_rgba(10,132,255,0.15)] object-contain" 
             src="./img/calogo1 2.png" 
             alt="Briefcase Illustration">
      </div>

    </div>

    <div class="absolute inset-0 border border-gray-800/20 pointer-events-none rounded-3xl m-4 hidden md:block"></div>
  </section>

  <section class="max-w-6xl mx-auto mt-8 px-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
      
      <div class="relative">
        <select class="w-full bg-[#1a1a1e] text-sm text-gray-300 border border-gray-800 rounded-xl px-4 py-3.5 appearance-none focus:outline-none focus:border-[#0A84FF] cursor-pointer">
          <option>Departments</option>
          
        </select>
        <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-500 text-xs">▼</div>
      </div>

      <div class="relative">
        <select class="w-full bg-[#1a1a1e] text-sm text-gray-300 border border-gray-800 rounded-xl px-4 py-3.5 appearance-none focus:outline-none focus:border-[#0A84FF] cursor-pointer">
          <option>Experience</option>
          
        </select>
        <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-500 text-xs">▼</div>
      </div>

      <div class="relative">
        <select class="w-full bg-[#1a1a1e] text-sm text-gray-300 border border-gray-800 rounded-xl px-4 py-3.5 appearance-none focus:outline-none focus:border-[#0A84FF] cursor-pointer">
          <option>Job Type</option>
          
        </select>
        <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-500 text-xs">▼</div>
      </div>

      <div class="relative">
        <select class="w-full bg-[#1a1a1e] text-sm text-gray-300 border border-gray-800 rounded-xl px-4 py-3.5 appearance-none focus:outline-none focus:border-[#0A84FF] cursor-pointer">
          <option>Workplace Type</option>
         
        </select>
        <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-gray-500 text-xs">▼</div>
      </div>

      <div class="sm:col-span-2 lg:col-span-1">
        <input type="text" 
               placeholder="Search by keywords..." 
               class="w-full bg-[#1a1a1e] text-sm text-gray-300 border border-gray-800 rounded-xl px-4 py-3.5 focus:outline-none focus:border-[#0A84FF] placeholder-gray-600">
      </div>

    </div>
  </section>
</body>
</html>
